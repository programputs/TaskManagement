<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to manage your tasks</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label>Email</label>
                <input formControlName="email" type="email"
                    placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input formControlName="password" type="password"
                    placeholder="••••••••" />
            </div>

            <button type="submit" [disabled]="form.invalid"
                class="auth-btn">Login</button>

            <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>
        </form>

        <p class="auth-switch">Don't have an account? <a
                routerLink="/signup">Sign Up</a></p>
    </div>
</div>
