<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">Task Management</div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to manage your tasks and projects</p>

        <div class="auth-tabs">
            <button type="button" class="tab active">Sign In</button>
            <button type="button" class="tab" routerLink="/signup">Create
                Account</button>
        </div>

        <h2 class="auth-section-title">Sign in to continue</h2>
        <p class="auth-section-subtitle">Access your tasks</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"><circle cx="12"
                            cy="8" r="4" /><path
                            d="M4 21c0-4 4-7 8-7s8 3 8 7" /></svg>
                </span>
                <input formControlName="email" type="email"
                    placeholder="you@example.com" />
            </div>

            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"><rect x="4"
                            y="11" width="16" height="9" rx="2" /><path
                            d="M8 11V7a4 4 0 1 1 8 0v4" /></svg>
                </span>
                <input formControlName="password" type="password"
                    placeholder="••••••••" />
                <span class="input-toggle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2"><path
                            d="M3 3l18 18" /><path
                            d="M10.6 10.6a2 2 0 0 0 2.8 2.8" /><path
                            d="M9.5 5.4A9.8 9.8 0 0 1 12 5c5 0 9 4 10 7-0.4 1.2-1.2 2.6-2.4 3.8M6.4 6.4C4.4 7.7 2.9 9.6 2 12c1 3 5 7 10 7 1.1 0 2.1-.2 3-.5" /></svg>
                </span>
            </div>

            <button type="submit" [disabled]="form.invalid"
                class="auth-btn">Sign In</button>

            <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>
        </form>

        <p class="auth-switch">No account yet? <a routerLink="/signup">Create
                one</a></p>
    </div>
</div>
