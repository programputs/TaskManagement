<div class="signup-wrapper">
    <div class="signup-card">
        <h1 class="signup-title">Create Account</h1>
        <p class="signup-subtitle">Start organizing your tasks today</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="signup-form">
            <div class="field-group">
                <label>Username</label>
                <input formControlName="username" type="text"
                    placeholder="Your Name" />
            </div>

            <div class="field-group">
                <label>Email</label>
                <input formControlName="email" type="email"
                    placeholder="you@example.com" />
            </div>

            <div class="field-group">
                <label>Password</label>
                <input formControlName="password" type="password"
                    placeholder />
            </div>

            <button type="submit" [disabled]="form.invalid"
                class="signup-btn">Sign Up</button>

            <p class="signup-error" *ngIf="errorMessage">{{ errorMessage }}</p>
        </form>

        <p class="signup-switch">Already have an account? <a
                routerLink="/login">Login</a></p>
    </div>
</div>
